name: Generate Minesweeper
on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

jobs:
  minesweeper:
    runs-on: ubuntu-latest
    
    # This grants the action permission to save the image back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Minesweeper SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: "" 
          plugin_minesweeper: yes
          plugin_minesweeper_best: yes  
          filename: minesweeper.svg 
          config_timezone: ${{ github.repository_owner_timezone }} 
          
      - name: Commit and Push output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add minesweeper.svg
          git commit -m "Update Minesweeper contribution graph" || exit 0
          git push
